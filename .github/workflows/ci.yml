name: CI — Lint, Test, Validate Bundle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      CODECOV_PROJECT_TOKEN: ${{ secrets.CODECOV_PROJECT_TOKEN }}
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"

      - name: Lint with ruff
        run: ruff check src tests docs

      - name: Run tests with coverage
        run: pytest -q --tb=short --cov=bronze_handoff_demo --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && env.CODECOV_PROJECT_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_PROJECT_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage to Codacy
        if: matrix.python-version == '3.12' && env.CODACY_PROJECT_TOKEN != ''
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ env.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml

      - name: Generate docs visuals
        run: python docs/generate_visuals.py

  snyk-security:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip Snyk when token is unavailable
        if: env.SNYK_TOKEN == ''
        run: echo "Skipping Snyk because SNYK_TOKEN is not configured."

      - name: Run Snyk to check for vulnerabilities
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  validate-bundle:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        if: env.DATABRICKS_HOST != '' && env.DATABRICKS_TOKEN != ''
        uses: databricks/setup-cli@v0.228.0

      - name: Skip bundle validation when Databricks secrets are unavailable
        if: env.DATABRICKS_HOST == '' || env.DATABRICKS_TOKEN == ''
        run: echo "Skipping Databricks bundle validation because required secrets are unavailable."

      - name: Validate dev bundle
        if: env.DATABRICKS_HOST != '' && env.DATABRICKS_TOKEN != ''
        run: databricks bundle validate --target dev

      - name: Validate prod bundle
        if: env.DATABRICKS_HOST != '' && env.DATABRICKS_TOKEN != ''
        run: databricks bundle validate --target prod
